<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" role="img" aria-label="rs-x logo">
  <defs>
    <linearGradient id="rsxBrand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b66ff"/>
      <stop offset="100%" stop-color="#2bb6a9"/>
    </linearGradient>

    <!-- Pure halo that fades to FULL transparent (no box/plate) -->
    <radialGradient id="rsxHalo" cx="44%" cy="36%" r="70%">
      <stop offset="0%" stop-color="rgba(11,102,255,0.20)"/>
      <stop offset="45%" stop-color="rgba(11,102,255,0.10)"/>
      <stop offset="70%" stop-color="rgba(43,182,169,0.08)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>

    <!-- Gentle glow only on the curve, NOT on a background shape -->
    <filter id="rsxLineGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Soft halo (circle, fades out; no shadow, no rect) -->
  <circle cx="22" cy="22" r="18.5" fill="url(#rsxHalo)"/>

  <!-- Reactivity curve -->
  <path
    d="M 12.2 26.4 C 16.2 16.2, 22.6 16.5, 27.0 22.0 S 33.0 30.4, 34.6 18.8"
    fill="none"
    stroke="url(#rsxBrand)"
    stroke-width="3.4"
    stroke-linecap="round"
    filter="url(#rsxLineGlow)"
  />

  <!-- Nodes -->
  <circle cx="12.2" cy="26.4" r="3.1" fill="url(#rsxBrand)"/>
  <circle cx="27.0" cy="22.0" r="3.1" fill="url(#rsxBrand)"/>
  <circle cx="34.6" cy="18.8" r="3.1" fill="url(#rsxBrand)"/>

  <!-- Subtle ring (also fades visually; no box) -->
  <circle cx="27.0" cy="22.0" r="8.4" fill="none" stroke="rgba(11,102,255,0.18)" stroke-width="2"/>
</svg>