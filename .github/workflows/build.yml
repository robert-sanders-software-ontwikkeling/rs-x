name: Build & Test Monorepo

on:
  push:
    branches:
      - feature/**
      - fix/**
      - refactor/**
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ------------------------------
      # Checkout repository
      # ------------------------------
      - name: Checkout repository
        uses: actions/checkout@v3

      # ------------------------------
      # Setup pnpm
      # ------------------------------
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.22.0

      # ------------------------------
      # Setup Node.js (with pnpm cache)
      # ------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: lts/*
          cache: pnpm

      # ------------------------------
      # Install dependencies
      # ------------------------------
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # =====================================================
      # 1️⃣ FORMAT
      # =====================================================
      - name: Check formatting
        run: pnpm -w run format:check

      # =====================================================
      # 2️⃣ LINT
      # =====================================================
      - name: Lint all projects
        run: pnpm -w run lint

      # =====================================================
      # 3️⃣ BUILD
      # =====================================================

      # Build all node libraries
      - name: Build Node libraries
        run: pnpm -w run build:libs

      # Build expression editor
      - name: Build expression-editor
        run: pnpm -w run build:expression-editor

      # Build Angular library
      - name: Build Angular library
        run: pnpm -w run build:angular

      # =====================================================
      # 4️⃣ TEST
      # =====================================================

      - name: Run Node tests
        run: pnpm -w run test

      - name: Run Angular tests
        run: pnpm -w run test:angular

      - name: Run React tests
        run: pnpm -w run test:react