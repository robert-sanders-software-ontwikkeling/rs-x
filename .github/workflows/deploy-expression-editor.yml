name: Deploy rs-x-expression-editor to GitHub Pages
env:
  GH_PAGES: 'true'
  NEXT_PUBLIC_BASE_PATH: '/rs-x'

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-rs-x-expression-editor
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.22.0

      - name: Setup Node.js (with pnpm cache)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build for GitHub Pages only (basePath=/rs-x etc)
      - name: Build expression-editor (GitHub Pages)
        env:
          GH_PAGES: 'true'
        run: pnpm -w run build:expression-editor

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Next export output folder is "out" (not dist) when output: 'export'
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: rs-x-expression-editor/out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
